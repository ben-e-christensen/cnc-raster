; PlatformIO Project Configuration File
; BigTreeTech Octopus V1.1 (STM32F446ZET6) - rotary Stewart platform firmware
;
; Board quirks this config works around (see README.md for details):
;   1. The Octopus uses a 12MHz crystal, not the 8MHz most STM32F4 boards assume.
;   2. STM32Duino ships no linker script for this exact flash/RAM variant, so we
;      supply one (STM32F446ZETx_FLASH.ld).
;   3. The stock "nucleo_f446ze"-family board manifests in some ststm32 platform
;      versions don't list "arduino" as a supported framework, so we supply our
;      own board definition (boards/genericSTM32F446ZE.json) that does.
;
; Credit: this config is adapted from maxgerhardt/nucleo-f446ze-with-arduino,
; which specifically documents the Octopus variant of this setup.

[env:octopus]
platform = ststm32
board = genericSTM32F446ZE
framework = arduino

; STM32Duino doesn't ship a linker script for this flash/RAM size - use ours.
board_build.ldscript = STM32F446ZETx_FLASH.ld

; Octopus-specific clock: 12MHz crystal (NOT the 8MHz most F4 boards use)
;
; QUIRK: newlib (the C library this toolchain uses) strips float support out
; of scanf/sscanf by default to save flash space. Serial.print(float) still
; works fine regardless - that's Arduino's own float formatting code, a
; completely separate codepath - but sscanf's %f silently fails without this,
; which is exactly what caused the "P" command's parse error. The
; -Wl,-u,_scanf_float flag below pulls the float-parsing table back in.
build_flags =
    -DHSE_VALUE=12000000L
    -DOCTOPUS_BOARD
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -Wl,-u,_scanf_float
    ; Debug/heartbeat serial redirected to the Raspberry-Pi header (PD5/PD6),
    ; separate from the USB-CDC serial used for the actual command interface.
    -DSERIAL_UART_INSTANCE=2
    -DPIN_SERIAL_RX=PD6
    -DPIN_SERIAL_TX=PD5

; REGARDING USB: the board has two USB connectors (Type-C and Type-A).
; Type-C -> PA11/PA12 (USB FS peripheral) - this is the one you'll actually
; plug your laptop into, and it's what this config targets by default.
; Type-A -> PB14/PB15 (USB HS-in-FS-mode) - only relevant if you define
; PIO_FRAMEWORK_ARDUINO_USB_HIGHSPEED_FULLMODE, which we deliberately don't.

; QUIRK: without this, no data will be received on the serial USB port.
; https://github.com/stm32duino/Arduino_Core_STM32/issues/1193
monitor_dtr = 1
monitor_speed = 115200

; Upload via USB DFU. Board must be reset into bootloader mode first:
; set the J75 BOOT0 jumper, then press the reset button once.
upload_protocol = dfu

lib_deps =
    teemuatlut/TMCStepper@^0.7.3
